name: Lion Animation

on:
  schedule:
    - cron: "0 */12 * * *"  # runs every 12 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: rajanmagratitsk
          head_img_url:https://images.stockcake.com/public/d/9/a/d9a9d400-feab-4c4d-b88d-bdff1229cadc_large/majestic-roaring-lion-stockcake.jpg  # Lion image
          outputs: |
            dist/github-contribution-grid-snake.svg

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
